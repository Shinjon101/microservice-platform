services:
   auth_db:
     image: postgres:16-alpine
     container_name: micro-service-platform-auth-db
     environment:
        POSTGRES_USER: ${POSTGRES_USER:-postgres}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
        POSTGRES_DB: ${POSTGRES_DB:-auth_db}
     ports:
        - "${AUTH_DB_PORT:-5432}:5432"
     volumes:
        - auth-db-data:/var/lib/postgresql/data
     networks:
        - micro-service-platform-network
     healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

   redis_gateway:
    image: redis:7-alpine
    container_name: micro-service-platform-redis-gateway
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - micro-service-platform-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  auth-db-data:
  redis-data:

networks:
  micro-service-platform-network:
    driver: bridge